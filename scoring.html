<!DOCTYPE html>
<html lang="id">
<head>
    <title>Live Skoring - LCC PAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen">
    
    <audio id="tick" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>
    <audio id="siren" src="https://actions.google.com/sounds/v1/alarms/bugle_tune.ogg" preload="auto"></audio>

    <header class="bg-green-700 text-white p-4 shadow-lg flex justify-between items-center">
        <div>
            <h1 id="info-giat" class="text-2xl font-bold text-yellow-300">LCC PAI</h1>
            <p id="info-skema" class="text-sm text-green-100">Skema: -</p>
        </div>
        <div class="text-right">
            <div id="info-babak" class="bg-green-900 px-4 py-1 rounded-full uppercase text-sm font-bold inline-block mb-1">BABAK - SESI</div>
            <a href="setup.html" class="block text-xs text-green-300 hover:text-white underline">Atur Ulang Sesi</a>
        </div>
    </header>

    <div class="p-6">
        <div class="max-w-2xl mx-auto bg-slate-800 text-white p-4 rounded-xl mb-8 flex flex-col items-center shadow-xl">
            <div class="text-gray-400 text-sm font-bold mb-1">TIMER WAKTU</div>
            <div id="timer-display" class="text-7xl font-mono font-bold text-red-500 mb-4">00</div>
            <div class="flex flex-wrap justify-center gap-3 mb-4">
    <button onclick="setT(10)" class="bg-slate-600 hover:bg-slate-500 px-4 py-2 rounded font-bold">10s</button>
    <button onclick="setT(30)" class="bg-slate-600 hover:bg-slate-500 px-4 py-2 rounded font-bold">30s</button>
    <div class="flex items-center bg-slate-700 rounded p-1">
        <input type="number" id="manual-sec" placeholder="Detik" class="w-16 p-1 text-black text-center font-bold rounded-l outline-none">
        <button onclick="setManualT()" class="bg-blue-600 hover:bg-blue-500 px-3 py-1.5 rounded-r font-bold">SET</button>
    </div>
</div>
<div class="flex gap-4">
    <button onclick="startT()" class="bg-green-600 hover:bg-green-500 px-8 py-2 rounded font-bold text-xl">MULAI</button>
    <button onclick="stopT()" class="bg-red-600 hover:bg-red-500 px-8 py-2 rounded font-bold text-xl">STOP/RESET</button>
</div>
        </div>

        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwrUtuolAUV-PrWHxTlDho5S51Dr74AT0ld0gkcjEzthxzz9o1bXYRo9Xd9-bYzpthQPQ/exec"; // PASTE LINK GAS DI SINI
        
        // PENCEGAHAN ERROR NULL PROPERTIES
        let rawData = localStorage.getItem('lcc_data');
        if (!rawData) {
            alert("Sesi kosong! Anda akan dialihkan ke halaman pengaturan.");
            window.location.href = "setup.html";
        }
        
        let dataSesi = JSON.parse(rawData);
        if (!dataSesi || !dataSesi.sesi) {
            alert("Data tim tidak lengkap. Silakan buat sesi kembali.");
            window.location.href = "setup.html";
        }

        function init() {
            // Set Informasi Header
            const meta = dataSesi.sesi.metadata;
            document.getElementById('info-giat').innerText = meta.giat.toUpperCase();
            document.getElementById('info-skema').innerText = `Skema Lolos: ${meta.skema}`;
            document.getElementById('info-babak').innerText = `${meta.babak} | ${meta.sesi}`;
            
            render();
        }

        function render() {
            let html = "";
            dataSesi.sesi.teams.forEach((t, i) => {
                html += `
                <div class="bg-white p-6 rounded-2xl shadow-lg border-b-8 border-green-600 text-center">
                    <div class="text-gray-500 font-bold text-sm bg-gray-100 rounded-full inline-block px-3 py-1 mb-2">NO. PESERTA: ${t.no}</div>
                    <div class="text-2xl font-bold uppercase truncate">${t.nama}</div>
                    <div class="text-sm italic text-gray-500 mb-4">${t.kec}</div>
                    <div id="sc-${i}" class="text-7xl font-black text-green-700 mb-6">${dataSesi.sesi.scores[i]}</div>
                    <div class="grid grid-cols-2 gap-2 text-sm font-bold">
                        <button onclick="upd(${i}, 100)" class="bg-green-500 hover:bg-green-600 text-white p-2 rounded">+100 (WAJIB)</button>
                        <button onclick="upd(${i}, 50)" class="bg-blue-500 hover:bg-blue-600 text-white p-2 rounded">+50 (LEMPAR)</button>
                        <button onclick="upd(${i}, -50)" class="bg-orange-500 hover:bg-orange-600 text-white p-2 rounded">-50 (SALAH)</button>
                        <button onclick="upd(${i}, -100)" class="bg-red-600 hover:bg-red-700 text-white p-2 rounded">-100 (REBUTAN)</button>
                    </div>
                </div>`;
            });
            document.getElementById('grid').innerHTML = html;
        }

        // Logic Update Skor
        function upd(idx, pts) {
            const el = document.getElementById(`sc-${idx}`);
            el.classList.add("opacity-50"); // Efek loading visual
            
            fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "updateScore", index: idx, points: pts }) })
            .then(res => res.json()).then(res => {
                dataSesi.sesi.scores = res.newScores;
                localStorage.setItem('lcc_data', JSON.stringify(dataSesi)); // Update local
                el.innerText = res.newScores[idx];
                el.classList.remove("opacity-50");
            }).catch(err => {
                alert("Koneksi gagal! Skor tidak tersimpan di server.");
                el.classList.remove("opacity-50");
            });
        }

        // Timer Logic
        let timer;
        let timeLeft = 0;
        const sndTick = document.getElementById('tick');
        const sndSiren = document.getElementById('siren');

        function setT(s) { 
            stopT(); 
            timeLeft = s; 
            updateT(); 
        }
        function updateT() { 
            document.getElementById('timer-display').innerText = timeLeft.toString().padStart(2, '0'); 
        }
        function startT() {
            if(timeLeft <= 0) return;
            clearInterval(timer);
            timer = setInterval(() => {
                timeLeft--; 
                updateT();
                
                if(timeLeft <= 5 && timeLeft > 0) {
                    sndTick.currentTime = 0;
                    sndTick.play().catch(e=>console.log("Audio block:", e));
                } else if(timeLeft <= 0) {
                    clearInterval(timer); 
                    sndSiren.currentTime = 0;
                    sndSiren.play().catch(e=>console.log("Audio block:", e));
                }
            }, 1000);
        }
        function stopT() { 
            clearInterval(timer); 
            timeLeft = 0;
            updateT();
            sndTick.pause(); sndSiren.pause();
        }

        // Jalankan saat load
        init();
    </script>
</body>
</html>

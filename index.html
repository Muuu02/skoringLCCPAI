<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCC PAI DIGITAL PRO - Official Scoring System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --accent: #3b82f6;
            --gold: #fbbf24;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.1) 0px, transparent 50%);
            overflow-x: hidden;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .score-text {
            font-family: 'JetBrains Mono', monospace;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        .winner-card {
            border: 2px solid var(--gold) !important;
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.3);
            transform: scale(1.02);
        }
        .history-item {
            border-left: 3px solid var(--accent);
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .btn-action { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-action:active { transform: scale(0.9); }
    </style>
</head>
<body class="text-slate-100 min-h-screen">

    <audio id="snd-tick" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>
    <audio id="snd-end" src="https://actions.google.com/sounds/v1/alarms/bugle_tune.ogg"></audio>

    <section id="view-login" class="flex items-center justify-center min-h-screen p-4">
        <div class="glass p-10 rounded-3xl w-full max-w-md shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500"></div>
            <div class="text-center mb-8">
                <h1 class="text-3xl font-extrabold tracking-tighter text-white">LCC PAI <span class="text-blue-500">DIGITAL</span></h1>
                <p class="text-slate-400 text-sm mt-2">Sistem Skoring Profesional v2.0</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Username</label>
                    <input type="text" id="user" class="w-full bg-slate-800/50 border border-slate-700 p-4 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition mt-1" placeholder="Admin/Operator">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Password</label>
                    <input type="password" id="pass" class="w-full bg-slate-800/50 border border-slate-700 p-4 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition mt-1" placeholder="••••••••">
                </div>
                <button onclick="app.login()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-900/20 transition-all active:scale-95 mt-4">
                    AUTHENTICATION
                </button>
            </div>
        </div>
    </section>

    <section id="view-dashboard" class="hidden p-6 md:p-12 max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
            <div>
                <h2 class="text-4xl font-black text-white">PILIH <span class="text-blue-500">SESI</span></h2>
                <p class="text-slate-400">Silahkan pilih sesi pertandingan yang akan dilaksanakan</p>
            </div>
            <div class="glass px-6 py-3 rounded-2xl border-blue-500/30">
                <p id="info-user" class="text-sm font-bold text-blue-400"></p>
                <p id="info-role" class="text-[10px] text-slate-500 uppercase tracking-widest"></p>
            </div>
        </header>
        <div id="session-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </section>

    <section id="view-scoring" class="hidden flex flex-col h-screen overflow-hidden">
        <header class="glass m-4 p-4 rounded-2xl flex justify-between items-center shadow-xl border-b-0 shrink-0">
            <div class="flex items-center gap-4">
                <button onclick="location.reload()" class="bg-slate-800 hover:bg-slate-700 p-3 rounded-xl transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                </button>
                <div>
                    <h2 id="sc-judul" class="text-xl font-extrabold text-white">LCC PAI 2025</h2>
                    <p id="sc-babak" class="text-xs text-blue-400 font-bold uppercase tracking-widest"></p>
                </div>
            </div>

            <div class="flex items-center gap-6 bg-black/30 px-6 py-2 rounded-2xl border border-white/5">
                <div id="timer-display" class="text-5xl font-mono font-black text-red-500 w-24 text-center">00</div>
                <div id="timer-controls" class="flex flex-col gap-1">
                    <div class="flex gap-1">
                        <button onclick="app.setT(15)" class="bg-slate-700 hover:bg-slate-600 px-2 py-1 rounded-md text-[10px] font-bold">15s</button>
                        <button onclick="app.setT(30)" class="bg-slate-700 hover:bg-slate-600 px-2 py-1 rounded-md text-[10px] font-bold">30s</button>
                        <input type="number" id="t-man" class="w-12 bg-slate-900 text-center text-[10px] rounded border border-slate-700" placeholder="Sec">
                        <button onclick="app.setManualT()" class="bg-blue-600 px-2 rounded-md text-[10px] font-bold uppercase">SET</button>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="app.startT()" class="flex-1 bg-green-600 hover:bg-green-500 py-1 rounded-md text-[10px] font-bold">START</button>
                        <button onclick="app.stopT()" class="flex-1 bg-red-600 hover:bg-red-500 py-1 rounded-md text-[10px] font-bold">STOP</button>
                    </div>
                </div>
            </div>

            <div class="hidden md:block text-right">
                <span id="sync-status" class="text-[10px] font-bold text-green-400 bg-green-400/10 px-3 py-1 rounded-full italic">● ONLINE</span>
            </div>
        </header>

        <div id="grid-scoring" class="flex-grow grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 p-4 overflow-y-auto">
            </div>

        <footer class="glass mx-4 mb-4 p-4 rounded-2xl border-t-0 shrink-0">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest flex items-center gap-2">
                    <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                    LOG AKTIVITAS & TRANSPARANSI NILAI
                </h3>
            </div>
            <div id="history-log" class="h-24 overflow-y-auto space-y-2 pr-2">
                </div>
        </footer>
    </section>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwZ1Bcc1p-WcHfuNUSjtOTY7FvjRhBeLWWGj1IZoDqxMt0mmyCi22rIbHI4lRxvSQPIhA/exec"; 

        const app = {
            role: null, user: null, sesi: null, scores: [], history: [], timer: null, timeLeft: 0,
            
            // --- LOGIN & DASHBOARD ---
            async login() {
                const u = document.getElementById('user').value, p = document.getElementById('pass').value;
                if(!u || !p) return alert("Isi username & password!");
                
                try {
                    const res = await (await fetch(API_URL, { method:'POST', body: JSON.stringify({action:'login', user:u, pass:p})})).json();
                    if(res.success) {
                        this.role = res.role; this.user = res.name;
                        document.getElementById('view-login').classList.add('hidden');
                        document.getElementById('view-dashboard').classList.remove('hidden');
                        document.getElementById('info-user').innerText = res.name;
                        document.getElementById('info-role').innerText = res.role;
                        this.loadSessions();
                    } else alert("Login Gagal! Periksa kembali akun Anda.");
                } catch(e) { alert("Koneksi Error!"); }
            },

            async loadSessions() {
                const list = document.getElementById('session-list');
                list.innerHTML = `<div class="col-span-full text-center p-10"><div class="animate-spin inline-block w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full mb-4"></div><p class="text-slate-500 font-bold">Menghubungkan ke Database Excel...</p></div>`;
                
                const res = await (await fetch(API_URL, { method:'POST', body: JSON.stringify({action:'getSessions'})})).json();
                let html = "";
                res.sessions.forEach(s => {
                    html += `
                    <div onclick="app.openSesi('${encodeURIComponent(JSON.stringify(s))}')" class="glass p-8 rounded-3xl border-l-4 border-blue-500 cursor-pointer hover:bg-slate-800/80 transition-all hover:-translate-y-2 group shadow-xl">
                        <span class="text-[10px] font-black text-blue-500 bg-blue-500/10 px-3 py-1 rounded-full">${s.babak}</span>
                        <h3 class="text-2xl font-black mt-4 text-white group-hover:text-blue-400">${s.nama}</h3>
                        <div class="flex items-center gap-2 mt-6 text-slate-500 text-sm font-semibold">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                            ${s.teams.length} Peserta Terdaftar
                        </div>
                    </div>`;
                });
                list.innerHTML = html;
            },

            openSesi(encoded) {
                this.sesi = JSON.parse(decodeURIComponent(encoded));
                this.scores = new Array(this.sesi.teams.length).fill(0);
                this.history = [`Sesi ${this.sesi.nama} Siap dimulai.`];
                
                document.getElementById('view-dashboard').classList.add('hidden');
                document.getElementById('view-scoring').classList.remove('hidden');
                document.getElementById('sc-judul').innerText = this.sesi.nama;
                document.getElementById('sc-babak').innerText = this.sesi.babak;

                const isViewer = this.role === 'VIEWER';
                if(isViewer) document.getElementById('timer-controls').classList.add('hidden');

                this.renderGrid();
                this.renderHistory();

                // SYNC: Local & Cloud
                if (isViewer) {
                    setInterval(() => this.pullCloud(), 3000);
                    window.addEventListener('storage', (e) => {
                        if(e.key === `lcc_v2_${this.sesi.id}`) {
                            const d = JSON.parse(e.newValue);
                            this.scores = d.scores; this.history = d.history;
                            this.renderGrid(); this.renderHistory();
                        }
                    });
                }
            },

            // --- SCORING CORE ---
            renderGrid() {
                let max = Math.max(...this.scores);
                let html = "";
                this.sesi.teams.forEach((t, i) => {
                    let isWinner = max > 0 && this.scores[i] === max;
                    html += `
                    <div class="glass p-6 rounded-3xl flex flex-col items-center justify-between border-b-4 border-slate-700 transition-all duration-500 ${isWinner ? 'winner-card' : ''} relative">
                        ${isWinner ? '<div class="absolute -top-5 text-3xl animate-bounce">👑</div>' : ''}
                        <div class="text-center w-full">
                            <p class="text-[10px] font-black text-slate-500 uppercase tracking-tighter mb-1">REGU ${['A','B','C','D','E','F'][i]}</p>
                            <h4 class="text-sm font-bold text-white truncate w-full px-2">${t.nama}</h4>
                            <p class="text-[9px] text-blue-500 font-bold uppercase">${t.kec}</p>
                        </div>
                        
                        <div class="score-text text-7xl font-black text-white py-6">${this.scores[i]}</div>

                        ${this.role !== 'VIEWER' ? `
                            <div class="grid grid-cols-2 gap-2 w-full">
                                <button onclick="app.upd(${i}, 100)" class="btn-action bg-green-600 hover:bg-green-500 py-3 rounded-xl text-[10px] font-black shadow-lg shadow-green-900/20">+100</button>
                                <button onclick="app.upd(${i}, 50)" class="btn-action bg-blue-600 hover:bg-blue-500 py-3 rounded-xl text-[10px] font-black shadow-lg shadow-blue-900/20">+50</button>
                                <button onclick="app.upd(${i}, -50)" class="btn-action bg-orange-600 hover:bg-orange-500 py-3 rounded-xl text-[10px] font-black shadow-lg shadow-orange-900/20">-50</button>
                                <button onclick="app.upd(${i}, -100)" class="btn-action bg-red-600 hover:bg-red-500 py-3 rounded-xl text-[10px] font-black shadow-lg shadow-red-900/20">-100</button>
                                <button onclick="app.customUpd(${i})" class="col-span-2 bg-slate-700 hover:bg-slate-600 py-2 rounded-xl text-[9px] font-bold border border-slate-600">MANUAL</button>
                            </div>
                        ` : ''}
                    </div>`;
                });
                document.getElementById('grid-scoring').innerHTML = html;
            },

            upd(idx, val, note = "") {
                this.scores[idx] += val;
                let log = `[${new Date().toLocaleTimeString('id-ID')}] ${this.sesi.teams[idx].nama} ${val > 0 ? '+'+val : val} Poin ${note}`;
                this.history.unshift(log);
                if(this.history.length > 30) this.history.pop();
                
                this.renderGrid(); this.renderHistory(); this.pushSync();
            },

            customUpd(idx) {
                let v = prompt("Masukkan nilai (gunakan '-' untuk mengurangi):", "0");
                if (v && !isNaN(v)) {
                    let n = prompt("Alasan (Opsional):", "Input Manual");
                    this.upd(idx, parseInt(v), `(${n})`);
                }
            },

            renderHistory() {
                document.getElementById('history-log').innerHTML = this.history.map(h => {
                    let color = h.includes('+') ? 'text-green-400' : (h.includes('-') ? 'text-red-400' : 'text-slate-400');
                    return `<div class="history-item glass px-4 py-2 rounded-xl text-[11px] font-medium ${color}">${h}</div>`;
                }).join('');
            },

            // --- SYNC ENGINE ---
            pushSync() {
                const data = { scores: this.scores, history: this.history };
                localStorage.setItem(`lcc_v2_${this.sesi.id}`, JSON.stringify(data));
                
                document.getElementById('sync-status').innerText = "⏳ SYNCING...";
                document.getElementById('sync-status').className = "text-[10px] font-bold text-yellow-400 bg-yellow-400/10 px-3 py-1 rounded-full italic";

                fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "syncScore", idSesi: this.sesi.id, ...data })})
                    .then(() => {
                        document.getElementById('sync-status').innerText = "● ONLINE";
                        document.getElementById('sync-status').className = "text-[10px] font-bold text-green-400 bg-green-400/10 px-3 py-1 rounded-full italic";
                    });
            },

            async pullCloud() {
                try {
                    const res = await (await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "getLive", idSesi: this.sesi.id })})).json();
                    if(res) {
                        this.scores = res.scores; this.history = res.history;
                        this.renderGrid(); this.renderHistory();
                    }
                } catch(e) {}
            },

            // --- TIMER ENGINE ---
            setT(s) { this.timeLeft = s; this.updateTUI(); },
            setManualT() { let v = parseInt(document.getElementById('t-man').value); if(!isNaN(v)) this.setT(v); },
            updateTUI() { 
                const el = document.getElementById('timer-display');
                el.innerText = this.timeLeft.toString().padStart(2,'0');
                el.classList.toggle('text-yellow-500', this.timeLeft <= 5 && this.timeLeft > 0);
            },
            startT() {
                clearInterval(this.timer);
                this.timer = setInterval(() => {
                    if(this.timeLeft > 0) {
                        this.timeLeft--; this.updateTUI();
                        if(this.timeLeft <= 5) document.getElementById('snd-tick').play().catch(e=>{});
                    } else {
                        clearInterval(this.timer);
                        document.getElementById('snd-end').play().catch(e=>{});
                        alert("WAKTU HABIS!");
                    }
                }, 1000);
            },
            stopT() { clearInterval(this.timer); this.setT(0); }
        };
    </script>
</body>
</html>

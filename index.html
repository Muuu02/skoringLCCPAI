<!DOCTYPE html>
<html>
<head>
    <title>Login - LCC PAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-96 border-t-4 border-green-600">
        <h2 class="text-2xl font-bold text-center mb-6">LCC PAI LOGIN</h2>
        <input type="text" id="user" placeholder="Username" class="w-full p-2 mb-4 border rounded">
        <input type="password" id="pass" placeholder="Password (ex: xxx243)" class="w-full p-2 mb-6 border rounded">
        <button onclick="login()" class="w-full bg-green-600 text-white p-2 rounded font-bold">MASUK</button>
    </div>
    <script>
        const API_URL = "URL_WEB_APP_GAS_ANDA_DISINI";
        function login() {
            const payload = { action: "login", username: id('user').value, password: id('pass').value };
            fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) })
            .then(res => res.json()).then(res => {
                if(res.success) {
                    localStorage.setItem('lcc_data', JSON.stringify(res.data));
                    window.location.href = "setup.html";
                } else { alert("Login Gagal!"); }
            });
        }
        function id(i) { return document.getElementById(i); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCC Digital - Professional Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; min-height: 100vh; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .btn-grad { transition: 0.3s; background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); }
        .btn-grad:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -10px #2563eb; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="selection:bg-blue-500 selection:text-white">

    <section id="view-login" class="flex items-center justify-center min-h-screen p-6">
        <div class="glass p-10 rounded-[32px] w-full max-w-sm text-center shadow-2xl">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-lg shadow-blue-500/30">
                <span class="text-3xl">🎯</span>
            </div>
            <h1 class="text-2xl font-black mb-1 tracking-tight">LCC <span class="text-blue-500">DIGITAL</span></h1>
            <p class="text-slate-400 mb-8 text-xs font-semibold uppercase tracking-widest">Sistem Manajemen Turnamen</p>
            
            <input type="text" id="user" placeholder="Username" class="w-full bg-slate-800/80 border border-slate-700 p-4 rounded-xl mb-3 focus:outline-none text-center font-bold text-white focus:ring-2 focus:ring-blue-500 transition">
            <input type="password" id="pass" placeholder="Password" class="w-full bg-slate-800/80 border border-slate-700 p-4 rounded-xl mb-6 focus:outline-none text-center font-bold text-white focus:ring-2 focus:ring-blue-500 transition">
            
            <button id="btn-login" onclick="app.login()" class="w-full btn-grad py-4 rounded-xl font-bold tracking-wide uppercase text-sm mb-4 shadow-lg shadow-blue-500/20">Masuk Sistem</button>
            <button onclick="app.role='VIEWER'; app.showDashboard()" class="w-full text-slate-500 text-[10px] font-bold hover:text-white transition uppercase tracking-widest">Akses Mode Display (Viewer)</button>
        </div>
    </section>

    <section id="view-dashboard" class="hidden p-6 md:p-8 max-w-7xl mx-auto w-full">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-slate-800/40 p-6 rounded-3xl border border-white/5">
            <div class="text-center md:text-left">
                <h2 class="text-3xl font-black text-white tracking-tight">Dashboard <span class="text-blue-500">Sesi</span></h2>
                <p class="text-slate-400 text-xs font-semibold mt-1">Data sinkron otomatis dengan Google Sheets</p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="app.loadSessions()" class="bg-slate-700 hover:bg-slate-600 px-4 py-3 rounded-xl transition text-white font-bold text-xs flex gap-2 items-center"><span class="text-blue-400">🔄</span> Refresh</button>
                <div class="bg-slate-900/50 px-6 py-2 rounded-xl border border-slate-700 text-right">
                    <p id="info-user" class="text-sm font-bold text-white leading-none mb-1"></p>
                    <p id="info-role" class="text-[9px] text-blue-400 uppercase tracking-widest font-bold"></p>
                </div>
                <button onclick="app.logout()" class="bg-red-500/10 hover:bg-red-600 text-red-500 hover:text-white px-4 py-3 rounded-xl text-xs font-bold transition">LOGOUT</button>
            </div>
        </header>

        <div id="babak-tabs" class="flex gap-2 mb-6 border-b border-slate-700 pb-2 overflow-x-auto"></div>
        
        <div id="session-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
    </section>

    <section id="view-scoring" class="hidden h-screen flex flex-col bg-slate-900">
        <nav class="p-4 glass flex justify-between items-center px-6 z-10 border-b border-white/5">
            <div class="flex items-center gap-4">
                <button onclick="app.backToDashboard()" class="text-slate-400 hover:text-white font-bold text-sm bg-slate-800 px-4 py-2 rounded-lg transition">← Dashboard</button>
                <div class="h-6 w-[1px] bg-slate-700"></div>
                <div>
                    <h4 id="sc-judul" class="font-black text-white text-lg leading-none">Sesi Lomba</h4>
                    <span id="sc-babak" class="text-[10px] text-blue-400 font-bold uppercase tracking-widest">Babak</span>
                </div>
            </div>
            
            <div id="timer-display" class="bg-black/60 px-6 py-2 rounded-2xl border border-white/10 flex items-center gap-6 shadow-inner">
                <span id="time" class="text-5xl font-mono font-black text-blue-500 tracking-tighter w-16 text-center transition-colors">00</span>
                <div id="timer-controls" class="flex flex-col gap-1.5">
                    <div class="flex gap-1.5">
                        <button onclick="app.setTimer(15)" class="bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded text-[10px] font-bold transition">15s</button>
                        <button onclick="app.setTimer(30)" class="bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded text-[10px] font-bold transition">30s</button>
                        <input type="number" id="custom-time" placeholder="Sec" class="w-12 bg-slate-900 text-center text-[10px] rounded border border-slate-600 outline-none focus:border-blue-500 transition">
                        <button onclick="app.setTimer(document.getElementById('custom-time').value)" class="bg-blue-600 hover:bg-blue-500 px-3 py-1 rounded text-[10px] font-bold transition">SET</button>
                    </div>
                    <div class="flex gap-1.5">
                        <button onclick="app.startTimer()" class="flex-1 bg-green-600 hover:bg-green-500 py-1 rounded text-[10px] font-bold transition shadow-lg shadow-green-500/20">START</button>
                        <button onclick="app.stopTimer()" class="flex-1 bg-red-600 hover:bg-red-500 py-1 rounded text-[10px] font-bold transition">STOP</button>
                    </div>
                </div>
            </div>

            <div id="admin-controls" class="flex gap-3">
    <button onclick="app.resetSesi()" class="px-5 py-2.5 rounded-xl font-bold text-xs bg-slate-700 hover:bg-slate-600 text-white transition">RESET</button>
    <button onclick="app.undo()" class="px-5 py-2.5 rounded-xl font-bold text-xs bg-slate-800 hover:bg-slate-700 text-white border border-slate-700 transition">UNDO</button>
    <button onclick="app.lockSesi()" class="px-5 py-2.5 rounded-xl font-bold text-xs bg-red-600 hover:bg-red-500 text-white shadow-lg shadow-red-500/30 transition">🔒 AKHIRI SESI</button>
</div>
        </nav>
        
        <main class="flex-1 flex overflow-hidden">
            <div id="team-grid" class="flex-1 p-6 grid gap-6 overflow-y-auto content-start justify-center"></div>
            <aside class="w-72 bg-slate-900 border-l border-white/5 p-6 hidden lg:flex flex-col">
                <h5 class="text-[10px] font-black text-slate-500 uppercase mb-4 tracking-widest">History Activity</h5>
                <div id="history-log" class="flex-1 space-y-2 overflow-y-auto pr-2"></div>
            </aside>
        </main>
    </section>

    <div id="modal-verify" class="hidden fixed inset-0 z-50 bg-slate-900/90 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="glass p-8 rounded-[32px] w-full max-w-md border border-slate-700 shadow-2xl transform transition-all">
            <h3 id="modal-title" class="text-2xl font-black text-white mb-1">Nama Sesi</h3>
            <p id="modal-babak" class="text-xs font-bold text-blue-400 uppercase tracking-widest mb-6">Babak</p>
            <div class="bg-slate-900/50 rounded-2xl p-4 mb-8">
                <table class="w-full text-left text-sm">
                    <tbody id="modal-team-list" class="divide-y divide-slate-800 text-slate-300"></tbody>
                </table>
            </div>
            <div class="flex gap-4">
                <button onclick="document.getElementById('modal-verify').classList.add('hidden')" class="flex-1 bg-slate-800 hover:bg-slate-700 font-bold py-3.5 rounded-xl transition">Batal</button>
                <button id="btn-start-sesi" class="flex-1 bg-blue-600 hover:bg-blue-500 font-bold py-3.5 rounded-xl shadow-lg shadow-blue-500/30 transition">Buka Sesi</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

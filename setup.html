<!DOCTYPE html>
<html>
<head>
    <title>Setup Tim - LCC PAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-8">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow">
        <h2 class="text-xl font-bold mb-4">Pengaturan Sesi (Maks 6 Tim)</h2>
        <input type="text" id="babak" placeholder="Nama Babak (Penyisihan/Final)" class="w-full p-2 border mb-4">
        <table class="w-full mb-6">
            <thead><tr class="bg-gray-200"><th>No. Peserta</th><th>Sekolah</th><th>Kecamatan</th></tr></thead>
            <tbody id="team-inputs"></tbody>
        </table>
        <button onclick="save()" class="bg-blue-600 text-white px-6 py-2 rounded">SIMPAN & MULAI</button>
    </div>
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwrUtuolAUV-PrWHxTlDho5S51Dr74AT0ld0gkcjEzthxzz9o1bXYRo9Xd9-bYzpthQPQ/exec";
        let html = "";
        for(let i=1; i<=6; i++) {
            html += `<tr>
                <td><input id="no-${i}" class="border p-1 w-full" placeholder="0${i}"></td>
                <td><input id="sch-${i}" class="border p-1 w-full" placeholder="Sekolah ${i}"></td>
                <td><input id="kec-${i}" class="border p-1 w-full" placeholder="Kecamatan"></td>
            </tr>`;
        }
        document.getElementById('team-inputs').innerHTML = html;

        function save() {
            let teams = [];
            for(let i=1; i<=6; i++) {
                if(document.getElementById(`sch-${i}`).value) {
                    teams.push({
                        no: document.getElementById(`no-${i}`).value,
                        nama: document.getElementById(`sch-${i}`).value,
                        kec: document.getElementById(`kec-${i}`).value
                    });
                }
            }
            fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "saveSetup", babak: document.getElementById('babak').value, teams: teams }) })
            .then(() => window.location.href = "scoring.html");
        }
    </script>
</body>
</html>
